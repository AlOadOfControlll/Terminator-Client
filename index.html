<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminator Cyber OS Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --theme:#00ff99;
}

body {
  margin:0;
  font-family: monospace;
  background:black;
  color:var(--theme);
  overflow:hidden;
}

/* BOOT */
#boot {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:50px;
  text-shadow:0 0 20px var(--theme);
  background:black;
  z-index:9999;
}

/* DESKTOP */
#desktop {
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
}

/* TASKBAR */
#taskbar {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:42px;
  background:#111;
  border-top:2px solid var(--theme);
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:10px;
}

/* START MENU */
#startMenu {
  position:absolute;
  bottom:45px;
  left:10px;
  width:220px;
  background:#111;
  border:2px solid var(--theme);
  display:none;
  flex-direction:column;
}

#startMenu button {
  background:none;
  border:none;
  color:var(--theme);
  padding:10px;
  text-align:left;
  cursor:pointer;
}
#startMenu button:hover {
  background:var(--theme);
  color:black;
}

/* WINDOWS */
.window {
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:#0a0a0a;
  border:none;
  display:none;
  flex-direction:column;
  overflow:hidden;
}

.titlebar {
  background:#111;
  padding:6px;
  cursor:move;
  display:flex;
  justify-content:space-between;
  border-bottom:2px solid var(--theme);
}

.content {
  flex:1;
  padding:0;
  overflow:hidden;
}

/* INPUTS */
input, button {
  background:black;
  color:var(--theme);
  border:1px solid var(--theme);
  padding:5px;
}

/* TABS */
.tabbar {
  display:flex;
  gap:5px;
  margin-bottom:5px;
}
.tab {
  padding:5px;
  border:1px solid var(--theme);
  cursor:pointer;
}
.tab.active {
  background:var(--theme);
  color:black;
}

/* IFRAME */
iframe {
  width:100%;
  height:calc(100% - 50px);
  border:none;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  WELCOME TERMINATOR<br>
  <span style="font-size:20px;">Initializing Cyber OS...</span>
</div>

<div id="desktop">

  <!-- START MENU -->
  <div id="startMenu">
    <button onclick="openApp('browser')">Browser</button>
    <button onclick="toggleTheme()">Change Theme</button>
  </div>

  <!-- BROWSER FULLSCREEN -->
  <div class="window" id="browser">
    <div class="titlebar">
      <span>Browser</span>
      <button onclick="closeApp('browser')">X</button>
    </div>
    <div class="content">
      <div class="tabbar" id="tabs"></div>
      <button onclick="newTab()">+ Tab</button>
      <input id="url" placeholder="Type URL or search">
      <button onclick="go()">GO</button>
      <iframe id="frame"></iframe>
    </div>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <button onclick="toggleStart()">START</button>
  </div>

</div>

<script>
/* ===== BOOT ===== */
setTimeout(()=>{
  document.getElementById("boot").style.display="none";
  document.getElementById("desktop").style.display="block";
},3000);

/* ===== START MENU ===== */
function toggleStart(){
  let m = document.getElementById("startMenu");
  m.style.display = m.style.display==="flex"?"none":"flex";
}

/* ===== APPS ===== */
function openApp(id){
  document.getElementById(id).style.display="flex";
}
function closeApp(id){
  document.getElementById(id).style.display="none";
}

/* ===== BROWSER TABS ===== */
let tabIndex=0;
function newTab(){
  let t=document.createElement("div");
  t.className="tab active";
  t.innerText="Tab "+(++tabIndex);
  t.onclick=()=>setActive(t);
  document.getElementById("tabs").appendChild(t);
  setActive(t);
}
function setActive(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");
}

/* ===== NAVIGATION ===== */
function go(){
  let u=document.getElementById("url").value;
  if(!u.startsWith("http")) u="https://www.google.com/search?q="+u;
  document.getElementById("frame").src=u;
}

/* ===== ENTER KEY ===== */
document.getElementById("url").addEventListener("keydown",(e)=>{
  if(e.key==="Enter") go();
});

/* ===== THEME SWITCHER ===== */
let themes=["#00ff99","#ff0033","#3399ff"],currentTheme=0;
function toggleTheme(){
  currentTheme=(currentTheme+1)%themes.length;
  document.documentElement.style.setProperty('--theme',themes[currentTheme]);
}
</script>

</body>
</html>
