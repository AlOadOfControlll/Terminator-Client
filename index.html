<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminator Video Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* General body */
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* Header */
header {
    background:#111;
    border-bottom:2px solid red;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    overflow:hidden;
}

header h1 {
    color:red;
    margin:0;
    text-shadow:0 0 10px red;
    animation: glow 1.5s infinite alternate;
}

/* Glow animation */
@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 20px #ff0000, 0 0 30px red; }
}

/* Buttons */
button {
    background:red;
    border:none;
    padding:8px;
    color:white;
    cursor:pointer;
    margin-left:5px;
}

/* Main container */
.container {
    display:flex;
    flex:1;
    padding:10px;
    gap:10px;
}

/* Controls panel */
.controls {
    width:220px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#111;
    border:2px solid red;
    padding:10px;
    border-radius:8px;
}

/* Inputs */
input[type="range"], input[type="number"], textarea {
    width:100%;
    background:#111;
    color:#ff0000;
    border:1px solid red;
    padding:5px;
    font-family:monospace;
}

/* Video and canvas */
video, canvas {
    flex:1;
    background:#222;
    border:2px solid red;
    border-radius:8px;
    max-height:70vh;
}
</style>
</head>
<body>

<header>
<h1>Welcome, Terminator! Ready to edit.</h1>
<div>
<input type="file" id="videoFile" accept="video/*">
<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="exportVideo()">Export</button>
</div>
</header>

<div class="container">
<div class="controls">
<label>Start (sec)</label><input type="number" id="start" value="0" min="0">
<label>End (sec)</label><input type="number" id="end" value="10" min="0">
<label>Text overlay</label><textarea id="overlayText">Terminator says hello!</textarea>
<label>Brightness</label><input type="range" id="brightness" min="0" max="2" value="1" step="0.05">
<label>Grayscale</label><input type="range" id="grayscale" min="0" max="1" value="0" step="0.05">
</div>

<video id="video" controls></video>
<canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const overlayText = document.getElementById("overlayText");
const brightness = document.getElementById("brightness");
const grayscale = document.getElementById("grayscale");
const startInput = document.getElementById("start");
const endInput = document.getElementById("end");
let mediaRecorder;
let recordedChunks = [];

document.getElementById("videoFile").addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(file) video.src = URL.createObjectURL(file);
});

video.addEventListener("loadedmetadata", ()=>{
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
});

function drawFrame(){
    if(video.paused || video.ended) return;
    ctx.filter = `brightness(${brightness.value}) grayscale(${grayscale.value})`;
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText(overlayText.value, 20, 50);
    requestAnimationFrame(drawFrame);
}

function play(){
    video.currentTime = parseFloat(startInput.value) || 0;
    video.play();
    drawFrame();
}

function pause(){
    video.pause();
}

function exportVideo(){
    const stream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(stream, {mimeType:"video/webm"});
    recordedChunks=[];
    mediaRecorder.ondataavailable = e=>{if(e.data.size>0) recordedChunks.push(e.data);}
    mediaRecorder.onstop = ()=>{
        const blob = new Blob(recordedChunks,{type:"video/webm"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "terminator_video.webm";
        a.click();
    };
    mediaRecorder.start();
    video.currentTime = parseFloat(startInput.value) || 0;
    video.play();
    drawFrame();
    setTimeout(()=>{video.pause(); mediaRecorder.stop();}, (endInput.value-startInput.value)*1000);
}
</script>

</body>
</html>
