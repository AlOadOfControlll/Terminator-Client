<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminator Cyber OS v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --theme:#00ff99;
}

body {
  margin:0;
  font-family: monospace;
  background:black;
  color:var(--theme);
  overflow:hidden;
}

/* BOOT */
#boot {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:42px;
  text-shadow:0 0 20px var(--theme);
  background:black;
  z-index:9999;
}

/* DESKTOP */
#desktop {
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
}

/* TASKBAR */
#taskbar {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:42px;
  background:#111;
  border-top:2px solid var(--theme);
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:10px;
}

/* START MENU */
#startMenu {
  position:absolute;
  bottom:45px;
  left:10px;
  width:220px;
  background:#111;
  border:2px solid var(--theme);
  display:none;
  flex-direction:column;
}

#startMenu button {
  background:none;
  border:none;
  color:var(--theme);
  padding:10px;
  text-align:left;
  cursor:pointer;
}
#startMenu button:hover {
  background:var(--theme);
  color:black;
}

/* WINDOWS */
.window {
  position:absolute;
  width:600px;
  height:400px;
  background:#0a0a0a;
  border:2px solid var(--theme);
  display:none;
  flex-direction:column;
  resize:both;
  overflow:hidden;
  box-shadow:0 0 20px var(--theme);
}

.titlebar {
  background:#111;
  padding:6px;
  cursor:move;
  display:flex;
  justify-content:space-between;
  border-bottom:2px solid var(--theme);
}

.content {
  flex:1;
  padding:10px;
  overflow:auto;
}

/* INPUTS */
input, button {
  background:black;
  color:var(--theme);
  border:1px solid var(--theme);
  padding:5px;
}

/* FILES */
.file {
  padding:5px;
  border:1px solid var(--theme);
  margin:5px;
}

/* TABS */
.tabbar {
  display:flex;
  gap:5px;
  margin-bottom:5px;
}

.tab {
  padding:5px;
  border:1px solid var(--theme);
  cursor:pointer;
}

.tab.active {
  background:var(--theme);
  color:black;
}

/* OVERLAY EFFECTS */
#overlay {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,255,150,0.12) 4px
  );
  display:none;
  z-index:998;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  WELCOME TERMINATOR<br>
  <span style="font-size:16px;">Initializing Cyber OS Core...</span>
</div>

<div id="overlay"></div>

<div id="desktop">

  <!-- START MENU -->
  <div id="startMenu">
    <button onclick="openApp('browser')">Browser</button>
    <button onclick="openApp('files')">File Explorer</button>
    <button onclick="openApp('terminal')">Terminal</button>
    <button onclick="toggleOverlay()">Hack Mode</button>
  </div>

  <!-- BROWSER -->
  <div class="window" id="browser">
    <div class="titlebar" onmousedown="drag(event,this.parentNode)">
      <span>Browser</span>
      <button onclick="closeApp('browser')">X</button>
    </div>

    <div class="content">
      <div class="tabbar" id="tabs"></div>
      <button onclick="newTab()">+ Tab</button>
      <br><br>

      <input id="url" placeholder="search or url">
      <button onclick="go()">GO</button>

      <iframe id="frame" style="width:100%;height:230px;border:none;background:white;"></iframe>
    </div>
  </div>

  <!-- FILES -->
  <div class="window" id="files">
    <div class="titlebar" onmousedown="drag(event,this.parentNode)">
      <span>File Explorer</span>
      <button onclick="closeApp('files')">X</button>
    </div>

    <div class="content">
      <div class="file">/projects</div>
      <div class="file">/media</div>
      <div class="file">system.log</div>
    </div>
  </div>

  <!-- TERMINAL -->
  <div class="window" id="terminal">
    <div class="titlebar" onmousedown="drag(event,this.parentNode)">
      <span>Terminal</span>
      <button onclick="closeApp('terminal')">X</button>
    </div>

    <div class="content">
      <pre id="log"></pre>
      <input onkeydown="cmd(event)" placeholder="scan / overlay / browser / theme">
    </div>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <button onclick="toggleStart()">START</button>
  </div>

</div>

<script>

/* ===== BOOT FIX (guaranteed exit) ===== */
setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("desktop").style.display = "block";
}, 2500);

/* ===== START MENU ===== */
function toggleStart(){
  let m = document.getElementById("startMenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

/* ===== APPS ===== */
function openApp(id){
  document.getElementById(id).style.display = "flex";
}
function closeApp(id){
  document.getElementById(id).style.display = "none";
}

/* ===== DRAG SYSTEM (stable) ===== */
let dragTarget = null, offsetX = 0, offsetY = 0;

function drag(e, el){
  dragTarget = el;
  offsetX = e.clientX - el.offsetLeft;
  offsetY = e.clientY - el.offsetTop;

  document.onmousemove = move;
  document.onmouseup = () => dragTarget = null;
}

function move(e){
  if(!dragTarget) return;
  dragTarget.style.left = (e.clientX - offsetX) + "px";
  dragTarget.style.top = (e.clientY - offsetY) + "px";
}

/* ===== OVERLAY ===== */
function toggleOverlay(){
  let o = document.getElementById("overlay");
  o.style.display = o.style.display === "block" ? "none" : "block";
}

/* ===== TERMINAL ===== */
function log(t){
  let l = document.getElementById("log");
  l.innerText += t + "\n";
  l.scrollTop = l.scrollHeight;
}

function cmd(e){
  if(e.key === "Enter"){
    let v = e.target.value.toLowerCase();
    e.target.value = "";

    if(v === "scan") log("Scanning system... OK (simulated)");
    else if(v === "overlay") toggleOverlay();
    else if(v === "browser") openApp("browser");
    else if(v === "files") openApp("files");
    else log("unknown command");
  }
}

/* ===== BROWSER TABS ===== */
let tabIndex = 0;

function newTab(){
  let t = document.createElement("div");
  t.className = "tab active";
  t.innerText = "Tab " + (++tabIndex);
  t.onclick = () => setActive(t);

  document.getElementById("tabs").appendChild(t);
  setActive(t);
}

function setActive(tab){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
}

/* ===== NAVIGATION ===== */
function go(){
  let u = document.getElementById("url").value;
  if(!u.startsWith("http")){
    u = "https://www.google.com/search?q=" + u;
  }
  document.getElementById("frame").src = u;
}

/* ===== KEY SHORTCUTS ===== */
document.addEventListener("keydown", (e) => {
  if(e.ctrlKey && e.key === "t"){
    newTab();
  }
  if(e.key === "Enter"){
    console.log("enter");
  }
});

</script>

</body>
</html>
