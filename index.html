<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safe Hacker Mod Menu</title>
<style>
body {
  margin:0;
  font-family: 'Courier New', monospace;
  background:black;
  color:lime;
  overflow:hidden;
}

/* Loading screen */
#loader {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:50px;
  text-shadow:0 0 20px lime;
  animation:flicker 1s infinite alternate;
}

@keyframes flicker { from{opacity:0.7;} to{opacity:1;} }

/* Main dashboard */
#dashboard {
  display:none;
  height:100vh;
  display:flex;
  flex-direction:row;
}

/* Sidebar menu */
.sidebar {
  width:250px;
  background:#111;
  border-right:2px solid lime;
  display:flex;
  flex-direction:column;
  padding:20px;
  gap:10px;
}

.sidebar button {
  background:lime;
  color:black;
  border:none;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
}

/* Main screen */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:20px;
  overflow:auto;
}

/* Output console */
.console {
  background:#000;
  border:2px solid lime;
  flex:1;
  padding:10px;
  overflow-y:auto;
  font-size:14px;
  white-space:pre-wrap;
}

/* Fancy effect */
.fancy-button {
  position:relative;
  overflow:hidden;
}

.fancy-button::before {
  content:'';
  position:absolute;
  top:0; left:-100%;
  width:100%; height:100%;
  background:rgba(255,255,255,0.2);
  transform:skewX(-20deg);
  transition:0.5s;
}

.fancy-button:hover::before {
  left:100%;
}
</style>
</head>
<body>

<div id="loader">WELCOME TERMINATOR</div>

<div id="dashboard">
  <div class="sidebar">
    <button class="fancy-button" onclick="fakeAction('Scan network...')">Network Scan</button>
    <button class="fancy-button" onclick="fakeAction('Bypassing firewall...')">Firewall Bypass</button>
    <button class="fancy-button" onclick="fakeAction('Accessing database...')">Database Access</button>
    <button class="fancy-button" onclick="fakeAction('Modifying settings...')">Settings Mod</button>
    <button class="fancy-button" onclick="fakeAction('Injecting code...')">Code Injection</button>
  </div>
  <div class="main">
    <h1>Safe Hacker Mod Menu</h1>
    <div class="console" id="console"></div>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
}, 4000);

const consoleEl = document.getElementById('console');

function fakeAction(text){
  const msg = `[${new Date().toLocaleTimeString()}] ${text}`;
  consoleEl.textContent += msg + '\n';
  consoleEl.scrollTop = consoleEl.scrollHeight;
}
</script>

</body>
</html>
