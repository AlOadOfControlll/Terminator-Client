<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminator Client</title>
<style>
:root{
    --red:#ff1a1a;
    --dark:#070707;
    --panel:#111111;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}
body{
    background:#000;
    color:white;
    overflow:hidden;
}
#bg{
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,#700000 0%,#000 60%);
}
#particles{
    position:fixed;
    inset:0;
}
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100%;
    background:rgba(10,10,10,.9);
    border-right:2px solid var(--red);
    z-index:5;
}
.logo{
    text-align:center;
    font-size:38px;
    font-weight:900;
    color:var(--red);
    margin-top:25px;
    text-shadow:0 0 20px red;
}
.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:20px;
}
.btn{
    width:90%;
    margin:10px auto;
    display:block;
    padding:14px;
    border:none;
    cursor:pointer;
    background:#1a1a1a;
    color:white;
    border:1px solid var(--red);
    transition:.25s;
}
.btn:hover{
    background:var(--red);
    transform:translateX(5px);
}
.main{
    margin-left:260px;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.launcher{
    width:850px;
    max-width:95%;
    background:rgba(15,15,15,.9);
    border:2px solid var(--red);
    border-radius:18px;
    padding:30px;
    backdrop-filter:blur(10px);
}
h1{
    color:var(--red);
    text-align:center;
    margin-bottom:10px;
}
.welcome{
    text-align:center;
    color:#ccc;
    margin-bottom:25px;
}
.serverbox{
    background:#090909;
    border:1px solid #333;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    border:1px solid #333;
    color:white;
}
.launch{
    width:100%;
    padding:16px;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    background:var(--red);
    color:white;
    border:none;
    cursor:pointer;
}
.launch:hover{
    filter:brightness(1.15);
}
iframe{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    display:none;
    z-index:100;
}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="particles"></canvas>

<div class="sidebar">
    <div class="logo">TERMINATOR</div>
    <div class="subtitle">Browser Client</div>
    <button class="btn">Home</button>
    <button class="btn">Multiplayer</button>
    <button class="btn">Settings</button>
    <button class="btn">Resource Packs</button>
    <button class="btn">About</button>
</div>

<div class="main">
    <div class="launcher">
        <h1>WELCOME TO TERMINATOR</h1>
        <div class="welcome">Futuristic Minecraft Browser Launcher</div>
        <div class="serverbox">
            Username
            <input id="username" value="Player">
            Server
            <select id="server">
                <option>https://eaglercraft.com/play</option>
                <!-- Add more servers here -->
            </select>
        </div>
        <button class="launch" onclick="launchClient()">LAUNCH GAME</button>
    </div>
</div>

<iframe id="game"></iframe>

<script>
function launchClient(){
    const frame = document.getElementById("game");
    const server = document.getElementById("server").value;
    frame.src = server;
    frame.style.display = "block";
}

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const particles = [];
for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:Math.random()*2+1,
        dx:(Math.random()-.5)*0.5,
        dy:(Math.random()-.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.dx;
        p.y+=p.dy;
        if(p.x<0||p.x>canvas.width)p.dx*=-1;
        if(p.y<0||p.y>canvas.height)p.dy*=-1;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,.8)";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
