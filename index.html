<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber OS Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --theme:#00ff99;
}

body{
  margin:0;
  font-family: monospace;
  background:black;
  color:var(--theme);
  overflow:hidden;
}

/* BOOT */
#boot{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:42px;
  background:black;
  z-index:9999;
}

/* DESKTOP */
#desktop{
  display:none;
  width:100vw;
  height:100vh;
}

/* FULLSCREEN BROWSER */
#browser{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  background:#0a0a0a;
}

/* TOP BAR */
#topbar{
  display:flex;
  gap:5px;
  padding:5px;
  background:#111;
  border-bottom:2px solid var(--theme);
}

input, button{
  background:black;
  color:var(--theme);
  border:1px solid var(--theme);
  padding:5px;
}

/* TABS */
#tabs{
  display:flex;
  gap:5px;
  padding:5px;
  background:#111;
}

.tab{
  padding:5px;
  border:1px solid var(--theme);
  cursor:pointer;
}
.tab.active{
  background:var(--theme);
  color:black;
}

/* IFRAME */
iframe{
  flex:1;
  border:none;
  background:white;
}

/* OVERLAY (HACK MODE) */
#overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  display:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,255,150,0.15) 4px
  );
  z-index:999;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
WELCOME TERMINATOR<br>
<span style="font-size:18px;">Starting System...</span>
</div>

<div id="overlay"></div>

<div id="desktop">

  <!-- BROWSER -->
  <div id="browser">

    <div id="topbar">
      <input id="url" placeholder="search or url">
      <button onclick="go()">GO</button>
      <button onclick="addBookmark()">★ Bookmark</button>
      <button onclick="toggleHack()">Hack Mode</button>
      <button onclick="toggleTheme()">Theme</button>
    </div>

    <div id="tabs"></div>

    <iframe id="frame"></iframe>
  </div>

</div>

<script>

/* ===== BOOT FIX ===== */
setTimeout(()=>{
  document.getElementById("boot").style.display="none";
  document.getElementById("desktop").style.display="block";
  newTab("Home");
},2500);

/* ===== TABS SYSTEM ===== */
let tabs=[];
let currentTab=0;
let bookmarks=[];

function newTab(name="Tab"){
  let tab={
    name:name,
    url:"https://www.google.com"
  };
  tabs.push(tab);
  currentTab=tabs.length-1;
  renderTabs();
  loadTab();
}

function renderTabs(){
  let t=document.getElementById("tabs");
  t.innerHTML="";

  tabs.forEach((tab,i)=>{
    let div=document.createElement("div");
    div.className="tab"+(i===currentTab?" active":"");
    div.innerText=tab.name;
    div.onclick=()=>{currentTab=i;loadTab();renderTabs();};
    t.appendChild(div);
  });
}

/* ===== NAVIGATION ===== */
function go(){
  let u=document.getElementById("url").value;
  if(!u.startsWith("http")){
    u="https://www.google.com/search?q="+u;
  }

  tabs[currentTab].url=u;
  loadTab();
}

function loadTab(){
  document.getElementById("frame").src=tabs[currentTab].url;
}

/* ===== ENTER KEY ===== */
document.getElementById("url").addEventListener("keydown",(e)=>{
  if(e.key==="Enter") go();
});

/* ===== BOOKMARKS ===== */
function addBookmark(){
  let url=tabs[currentTab].url;
  bookmarks.push(url);
  alert("Bookmarked: "+url);
}

/* ===== HACK MODE ===== */
function toggleHack(){
  let o=document.getElementById("overlay");
  o.style.display = o.style.display==="block"?"none":"block";
}

/* ===== THEMES ===== */
let themes=["#00ff99","#ff0033","#3399ff"];
let themeIndex=0;

function toggleTheme(){
  themeIndex=(themeIndex+1)%themes.length;
  document.documentElement.style.setProperty("--theme",themes[themeIndex]);
}

</script>

</body>
</html>
