<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminator Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --theme: lime;
}

body {
  margin:0;
  font-family: monospace;
  background:black;
  color:var(--theme);
  overflow:hidden;
}

/* BOOT */
#boot {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:40px;
  text-shadow:0 0 20px var(--theme);
  background:black;
  z-index:999;
}

/* TOP BAR (Chrome style) */
#topbar {
  display:flex;
  align-items:center;
  background:#111;
  border-bottom:2px solid var(--theme);
  padding:5px;
  gap:10px;
}

#url {
  flex:1;
  padding:8px;
  background:black;
  border:1px solid var(--theme);
  color:var(--theme);
}

/* BUTTONS */
button {
  background:var(--theme);
  color:black;
  border:none;
  padding:8px;
  cursor:pointer;
  font-weight:bold;
}

/* MAIN LAYOUT */
#browser {
  display:none;
  height:100vh;
  flex-direction:column;
}

#content {
  flex:1;
  display:flex;
}

/* IFRAME AREA */
iframe {
  flex:1;
  border:none;
  background:white;
}

/* MOD MENU */
#modmenu {
  position:fixed;
  top:50px;
  right:0;
  width:300px;
  height:calc(100% - 50px);
  background:#111;
  border-left:2px solid var(--theme);
  display:none;
  flex-direction:column;
  padding:10px;
  gap:10px;
}

/* EXTENSIONS PANEL */
.extension {
  padding:8px;
  border:1px solid var(--theme);
  cursor:pointer;
}

/* THEME PICKER */
input[type="color"] {
  width:100%;
}

.glow {
  text-shadow:0 0 10px var(--theme);
}
</style>
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot">
  WELCOME TERMINATOR
  <div style="font-size:14px; margin-top:10px;">Initializing browser core...</div>
</div>

<!-- BROWSER -->
<div id="browser">

  <!-- TOP BAR -->
  <div id="topbar">
    <button onclick="toggleMod()">MOD</button>
    <input id="url" placeholder="Search or enter URL">
    <button onclick="go()">GO</button>
  </div>

  <div id="content">
    <iframe id="frame"></iframe>
  </div>

</div>

<!-- MOD MENU -->
<div id="modmenu">
  <h2 class="glow">MOD MENU</h2>

  <button onclick="fakeLog('Network Scan running...')">Network Scan</button>
  <button onclick="fakeLog('Packet analyzer active...')">Packet View</button>
  <button onclick="fakeLog('Rendering overlay...')">Overlay Mode</button>

  <h3>Theme</h3>
  <input type="color" oninput="setTheme(this.value)">

  <h3>Extensions</h3>
  <div class="extension" onclick="fakeLog('AdBlock toggled (simulated)')">AdBlock</div>
  <div class="extension" onclick="fakeLog('Dark Mode forced')">Dark Mode</div>
  <div class="extension" onclick="fakeLog('UI Injector loaded')">UI Injector</div>

  <h3>Console</h3>
  <div id="console" style="font-size:12px; height:200px; overflow:auto; border:1px solid var(--theme); padding:5px;"></div>
</div>

<script>

setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("browser").style.display = "flex";
}, 4000);

/* NAVIGATION */
function go(){
  let url = document.getElementById("url").value;
  if(!url.startsWith("http")) url = "https://www.google.com/search?q=" + url;
  document.getElementById("frame").src = url;
}

/* MOD MENU */
function toggleMod(){
  const m = document.getElementById("modmenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

/* THEME */
function setTheme(color){
  document.documentElement.style.setProperty("--theme", color);
}

/* FAKE CONSOLE */
function fakeLog(text){
  const c = document.getElementById("console");
  const time = new Date().toLocaleTimeString();
  c.innerHTML += `[${time}] ${text}<br>`;
  c.scrollTop = c.scrollHeight;
}

</script>

</body>
</html>
